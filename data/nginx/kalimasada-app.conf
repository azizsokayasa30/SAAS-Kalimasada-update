    listen [::]:443 ssl http2;
    server_name kalimasada-app.com *.kalimasada-app.com manage.kalimasada-app.com tenant1.kalimasada-app.com default.kalimasada-app.com;
    ssl_certificate /etc/letsencrypt/live/kalimasada-app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kalimasada-app.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://kalimasada_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name kalimasada-app.com *.kalimasada-app.com manage.kalimasada-app.com tenant1.kalimasada-app.com default.kalimasada-app.com;

