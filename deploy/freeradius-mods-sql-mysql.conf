# FreeRADIUS SQL module — MySQL (billing-kalimasada)
# Deploy: sudo cp deploy/freeradius-mods-sql-mysql.conf /etc/freeradius/3.0/mods-enabled/sql
#
# WAJIB: jangan simpan file *.bak* di mods-enabled/ (FreeRADIUS memuat semua file di folder itu).

sql {
	dialect = "mysql"
	driver = "rlm_sql_${dialect}"

	server = "localhost"
	port = 3306
	login = "radius"
	password = "oynFhZz8yD9zZ9jQF3CIdwi1d"
	radius_db = "radius"

	mysql {
		warnings = auto
	}

	acct_table1 = "radacct"
	acct_table2 = "radacct"
	postauth_table = "radpostauth"
	authcheck_table = "radcheck"
	groupcheck_table = "radgroupcheck"
	authreply_table = "radreply"
	groupreply_table = "radgroupreply"
	usergroup_table = "radusergroup"

	delete_stale_sessions = yes

	pool {
		start = ${thread[pool].start_servers}
		min = ${thread[pool].min_spare_servers}
		max = ${thread[pool].max_servers}
		spare = ${thread[pool].max_spare_servers}
		uses = 0
		retry_delay = 30
		lifetime = 0
		idle_timeout = 60
	}

	read_clients = yes
	client_table = "nas"
	group_attribute = "SQL-Group"

	$INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf
}
